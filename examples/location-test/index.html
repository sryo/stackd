<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      color: #f5f5f7;
    }
    .card {
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.35;
    }
    .title { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; }
    .value { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">location</div>
    <div class="value">{{ sd.location ? sd.location.lat.toFixed(3) + ', ' + sd.location.lon.toFixed(3) + ' (±' + Math.round(sd.location.accuracy) + 'm)' : 'waiting for fix…' }}</div>
  </div>
</body>
</html>
