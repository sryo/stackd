<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 10px 12px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 10px; margin: 0 0 4px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  #url { font: 12px ui-monospace, Menlo, monospace; margin-top: 4px; }
  #hits { margin-top: 6px; opacity: 0.7; font: 10px ui-monospace; }
</style>
</head><body>
<h1>httpserver — try curl on the URL below</h1>
<div id="url">starting…</div>
<div id="hits">0 requests</div>
<script type="module">
  import { sd } from "sd://runtime/api.js";

  // sd.httpserver — long-running Network.framework listener.
  //
  // Primary consumer: CloudPad (serves snapshots + bang surface to phones on
  // the LAN).
  // Secondary consumer: any webhook receiver stack (Discord/GitHub/Stripe
  // local-tunneling sinks) or local API dashboard. The "loopback by default,
  // 0.0.0.0 only when asked" rule keeps it safe to develop against.

  let hits = 0;
  const srv = await sd.httpserver.serve({
    port: 7373,
    routes: {
      "GET /hello": async (req) => {
        hits++;
        document.getElementById("hits").textContent = `${hits} request${hits === 1 ? "" : "s"}`;
        return { body: `hello from stackd — you said ${req.path}` };
      },
      "POST /echo": async (req) => ({
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ youSent: req.body, headers: req.headers })
      })
    }
  });

  if (!srv) {
    document.getElementById("url").textContent = "serve failed (port in use?)";
  } else {
    document.getElementById("url").textContent = `${srv.url}/hello`;
  }
</script>
</body></html>
