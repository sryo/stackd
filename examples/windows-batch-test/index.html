<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 10px 12px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
    background: rgba(20, 20, 22, 0.78);
    border-radius: 10px;
    -webkit-backdrop-filter: blur(20px);
  }
  h1 { font-size: 10px; margin: 0 0 6px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  pre { margin: 4px 0; font: 10px ui-monospace, Menlo, monospace; line-height: 1.45; opacity: 0.8; }
  .kbd { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-family: ui-monospace, Menlo, monospace; }
  .pair { margin-bottom: 4px; }
</style>
</head><body>
<h1>windows batch</h1>
<div class="pair"><span class="kbd">ctrl+alt+b</span> batched setFrame</div>
<div class="pair"><span class="kbd">ctrl+alt+n</span> naive setFrame</div>
<div class="pair"><span class="kbd">ctrl+alt+r</span> refresh window picks</div>
<pre id="hud">picking windows…</pre>
<script type="module">
  import { sd } from "sd://runtime/api.js";
  const hud = document.getElementById("hud");

  let a = null, b = null;
  // Toggle layout each press so two presses round-trip.
  let swapped = false;

  async function pickWindows() {
    const all = await new Promise(r => sd.windows.all.subscribe(v => r(v)));
    const list = (all || []).filter(w => w.title && w.frame.w > 200 && w.frame.h > 200);
    if (list.length < 2) {
      hud.textContent = "need at least 2 visible windows with titles";
      return false;
    }
    a = list[0];
    b = list[1];
    hud.textContent = `A: ${a.app} (${a.id})\nB: ${b.app} (${b.id})`;
    return true;
  }

  function leftRect()  { return { x: 0,   y: 60, w: 800, h: 600 }; }
  function rightRect() { return { x: 820, y: 60, w: 800, h: 600 }; }

  async function batched() {
    if (!a || !b) { await pickWindows(); if (!a) return; }
    const t0 = performance.now();
    const A = swapped ? rightRect() : leftRect();
    const B = swapped ? leftRect()  : rightRect();
    await sd.windows.batch(async () => {
      await sd.windows.setFrame(a.id, A);
      await sd.windows.setFrame(b.id, B);
    });
    swapped = !swapped;
    hud.textContent = `batched in ${(performance.now() - t0).toFixed(0)}ms\nswapped=${swapped}`;
  }

  async function naive() {
    if (!a || !b) { await pickWindows(); if (!a) return; }
    const t0 = performance.now();
    const A = swapped ? rightRect() : leftRect();
    const B = swapped ? leftRect()  : rightRect();
    await sd.windows.setFrame(a.id, A);
    await sd.windows.setFrame(b.id, B);
    swapped = !swapped;
    hud.textContent = `naive in ${(performance.now() - t0).toFixed(0)}ms\nswapped=${swapped}`;
  }

  window.onHotkey_batched = batched;
  window.onHotkey_naive   = naive;
  window.onHotkey_refresh = pickWindows;

  pickWindows();
</script>
</body></html>
