<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 10px 12px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 10px; margin: 0 0 6px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  #meta { font-size: 10px; opacity: 0.65; margin-bottom: 6px; }
  img { display: block; width: 100%; height: auto; border-radius: 6px; background: #000; }
</style>
</head><body>
<h1>display snapshot — ctrl+alt+s</h1>
<div id="meta">waiting…</div>
<img id="shot" alt="">
<script type="module">
  import { sd } from "sd://runtime/api.js";

  const shoot = async () => {
    const t0 = performance.now();
    const r = await sd.display.snapshot({ format: "jpeg", quality: 0.7 });
    const dt = (performance.now() - t0).toFixed(0);
    if (!r) {
      document.getElementById("meta").textContent = "capture failed (deny / no permission?)";
      return;
    }
    document.getElementById("shot").src = r.dataURL;
    document.getElementById("meta").textContent =
      `${r.width}x${r.height}px · ${dt}ms · ${(r.dataURL.length / 1024).toFixed(0)} KB`;
  };

  window.onHotkey_snap = shoot;
  shoot();
</script>
</body></html>
