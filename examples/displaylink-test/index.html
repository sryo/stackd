<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 12px 14px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 10px; margin: 0 0 6px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  pre { margin: 0; font: 11px ui-monospace, Menlo, monospace; line-height: 1.45; }
</style>
</head><body>
<h1>displayLink</h1>
<pre id="hud">waiting for first vsync…</pre>
<script type="module">
  import { sd } from "sd://runtime/api.js";
  const hud = document.getElementById("hud");
  let frames = 0, lastT = 0, fps = 0;
  sd.displayLink.subscribe(s => {
    if (!s) return;
    frames++;
    if (lastT === 0) lastT = s.timestamp;
    if (s.timestamp - lastT >= 1) {
      fps = frames;
      frames = 0;
      lastT = s.timestamp;
    }
    hud.textContent =
      `frame    ${s.frame}\n` +
      `refresh  ${s.refreshRate.toFixed(0)} Hz\n` +
      `measured ${fps} fps`;
  });
</script>
</body></html>
