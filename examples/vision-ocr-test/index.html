<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 10px 12px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 10px; margin: 0 0 6px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  #meta { font-size: 10px; opacity: 0.65; margin-bottom: 6px; }
  .stage { position: relative; width: 100%; }
  .stage img { width: 100%; height: auto; display: block; border-radius: 6px; background: #000; }
  .obs { position: absolute; border: 1px solid rgba(255,200,80,0.85); background: rgba(255,200,80,0.12); }
  #text { margin-top: 8px; font: 10px ui-monospace, Menlo, monospace; max-height: 120px; overflow: auto; opacity: 0.85; }
</style>
</head><body>
<h1>vision OCR — ctrl+alt+o</h1>
<div id="meta">waiting…</div>
<div class="stage" id="stage">
  <img id="shot" alt="">
</div>
<pre id="text"></pre>
<script type="module">
  import { sd } from "sd://runtime/api.js";

  const stage = document.getElementById("stage");

  const run = async () => {
    document.getElementById("meta").textContent = "capturing…";
    const t0 = performance.now();
    const snap = await sd.display.snapshot({ format: "jpeg", quality: 0.8 });
    if (!snap) { document.getElementById("meta").textContent = "capture failed"; return; }

    document.getElementById("shot").src = snap.dataURL;
    document.getElementById("meta").textContent = "OCR…";

    const r = await sd.vision.ocr({ image: snap.dataURL, recognitionLevel: "accurate" });
    const dt = (performance.now() - t0).toFixed(0);
    if (!r) { document.getElementById("meta").textContent = "OCR failed"; return; }

    // Clear old overlays, redraw.
    stage.querySelectorAll(".obs").forEach(n => n.remove());
    for (const o of r.observations) {
      const b = o.boundingBox;
      const div = document.createElement("div");
      div.className = "obs";
      div.style.left   = (b.x * 100) + "%";
      div.style.top    = (b.y * 100) + "%";
      div.style.width  = (b.w * 100) + "%";
      div.style.height = (b.h * 100) + "%";
      div.title = `${o.text} (${(o.confidence*100).toFixed(0)}%)`;
      stage.appendChild(div);
    }
    document.getElementById("text").textContent = r.observations.map(o => o.text).join("\n");
    document.getElementById("meta").textContent = `${r.observations.length} observations · ${dt}ms`;
  };

  window.onHotkey_snap = run;
  run();
</script>
</body></html>
