<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body {
    margin: 0; padding: 10px 12px;
    font: 11px -apple-system, system-ui, sans-serif;
    color: #fff;
    background: rgba(20, 20, 22, 0.78);
    border-radius: 10px;
    -webkit-backdrop-filter: blur(20px);
  }
  h1 { font-size: 10px; margin: 0 0 4px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
  h2 { font-size: 9px; margin: 6px 0 2px; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.06em; }
  .col { font: 10px ui-monospace, Menlo, monospace; line-height: 1.35; white-space: pre; }
  .empty { opacity: 0.4; font-style: italic; }
</style>
</head><body>
<h1>sensors</h1>

<h2>temperatures (first 5)</h2>
<div class="col">
  <div sd-each="(sd.sensors?.temperatures || []).slice(0, 5)">{{ item.name.padEnd(20) }} {{ item.value.toFixed(1) }} {{ item.unit }}</div>
  <div sd-if="!sd.sensors?.temperatures?.length" class="empty">(none)</div>
</div>

<h2>voltages (first 3)</h2>
<div class="col">
  <div sd-each="(sd.sensors?.voltages || []).slice(0, 3)">{{ item.name.padEnd(20) }} {{ item.value.toFixed(2) }} {{ item.unit }}</div>
  <div sd-if="!sd.sensors?.voltages?.length" class="empty">(none)</div>
</div>

<h2>fans</h2>
<div class="col">
  <div sd-each="sd.sensors?.fans || []">{{ item.name.padEnd(20) }} {{ item.rpm }} RPM</div>
  <div sd-if="!sd.sensors?.fans?.length" class="empty">(none)</div>
</div>
</body></html>
