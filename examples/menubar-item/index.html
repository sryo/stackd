<!doctype html>
<html><head><meta charset="utf-8"></head><body>
<script type="module">
  import { sd } from "sd://runtime/api.js";

  // sd.menubar.addItem returns a Promise<MenubarItem | null>. The handle is
  // bound to the stack lifetime — unload removes the NSStatusItem automatically.
  const item = await sd.menubar.addItem({
    icon:    { sfSymbol: "battery.100" },
    tooltip: "battery — click for menu",
    menu: [
      { id: "info", title: "About this widget" },
      { separator: true },
      { id: "quit", title: "Remove item" }
    ],
    onMenuPick: (pickId) => {
      if (pickId === "info") item.setTitle(" ⓘ ");
      if (pickId === "quit") item.remove();
      setTimeout(() => item.setTitle(""), 1500);
    }
  });

  // Pick an SF Symbol that matches battery level. setIcon() can be called
  // any time after addItem to mutate the visible icon.
  sd.battery.subscribe(b => {
    if (!b || b.percent < 0) return;
    const sym = b.percent > 75 ? "battery.100" :
                b.percent > 50 ? "battery.75"  :
                b.percent > 25 ? "battery.50"  :
                b.percent > 10 ? "battery.25"  : "battery.0";
    item.setIcon({ sfSymbol: sym });
  });
</script>
</body></html>
