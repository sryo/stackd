<!doctype html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0; font-family: -apple-system; color: #f5f5f7; background: transparent;">
  <div style="padding: 6px 10px; background: rgba(50,30,30,0.85); border-radius: 8px;">
    <span id="t">awaiting bangs…</span>
  </div>
  <script type="module">
    // Bang handlers are window globals: `onBang_<sanitized name>(detail)`.
    // Names are lowercased + non-alphanumerics replaced with `_`.
    // `demo.greeting` → `onBang_demo_greeting`.
    window.onBang_demo_greeting = (detail) => {
      t.textContent = `got #${detail.count}`;
    };
  </script>
</body></html>
