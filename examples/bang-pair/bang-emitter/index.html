<!doctype html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0; font-family: -apple-system; color: #f5f5f7; background: transparent;">
  <div style="padding: 6px 10px; background: rgba(28,28,30,0.85); border-radius: 8px;">
    <span id="t">emitting…</span>
  </div>
  <script type="module">
    import { sd } from "sd://runtime/api.js";
    let n = 0;
    setInterval(() => {
      n++;
      // sd.bang(name, detail) fans the message out to every stack whose
      // manifest declares `"handles": ["demo.greeting"]`.
      sd.bang("demo.greeting", { count: n });
      t.textContent = `sent #${n}`;
    }, 3000);
  </script>
</body></html>
