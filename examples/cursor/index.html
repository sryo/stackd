<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="index.css">
  <title>Cursor</title>
</head>
<body>
  <div class="card">
    <div class="label">CURSOR</div>
    <div class="coords">
      <span>{{ sd.mouse.x }}</span>
      <span class="sep">,</span>
      <span>{{ sd.mouse.y }}</span>
    </div>
  </div>
  <script type="module">
    // `stackd bang user.beep` → flashes this stack yellow.
    window.onBang_user_beep = () => {
      document.body.classList.remove("beep");
      void document.body.offsetWidth;
      document.body.classList.add("beep");
    };
  </script>
</body>
</html>
